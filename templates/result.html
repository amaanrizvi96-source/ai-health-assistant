<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Diagnosis Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <header class="header">
        <h1>🩺 Diagnosis Result</h1>
    </header>

    <div class="container">

        <div class="result">
            <h3>🦠 Symptoms: <span>{{ symptoms }}</span></h3>
            <h3>🩺 Disease: <span>{{ disease }}</span></h3>

            <p><strong>Description:</strong> {{ description }}</p>

            <p><strong>Precautions:</strong></p>
            <ul>
                {% for p in precautions %}
                    <li>{{ p }}</li>
                {% endfor %}
            </ul>

            <h3 class="takecare">💖 Take care and stay healthy!</h3>

            <a href="/" class="back-btn">⬅ Go Back</a>
        </div>

    </div>

</body>
</html>
